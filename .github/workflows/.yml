name: Go CI/CD Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Matrix
      uses: actions/checkout@v4   # 🔥 ขันน็อตอัปเกรดขึ้น v4 ล่าสุด

    - name: Set up Go Engine
      uses: actions/setup-go@v5   # 🔥 ขันน็อตอัปเกรดขึ้น v5 ล่าสุด
      with:
        go-version: '1.22'

    - name: Run Code Audit & Formatting
      run: go test -v ./...
      
