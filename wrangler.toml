name = "tnh-ai-v83-trinity-empire"
main = "src/index.ts"
compatibility_date = "2026-07-04"

# ผูกสิทธิ์ระบบความจำหลัก (D1 & KV Bindings)
[[kv_namespaces]]
binding = "TNH_KV"
id = "6a8b4373-bf40-4b63-bb02-f612ecbe63b7" # ผูกไอดีตู้เซฟความจำถาวร

[[d1_databases]]
binding = "thitnueahub_core_db"
database_name = "thitnueahub-core-db"
database_id = "6a8b4373-bf40-4b63-bb02-f612ecbe63b7"

# [เปิดใช้งานท่อสังเกตการณ์ล็อกบริบทถาวรตามพิมพ์เขียวแท้ 🌱 j + ทอม 👾]
[observability.traces]
enabled = true
destinations = [ "tnh-tracing-hub" ]
head_sampling_rate = 0.05
persist = false

[observability.logs]
enabled = true
destinations = [ "tnh-log-sink" ]
head_sampling_rate = 0.60
persist = false
